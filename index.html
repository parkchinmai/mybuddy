function doDestSearch(q) {
  const status = document.getElementById('destSearchStatus');
  status.textContent = '⏳ กำลังค้นหา...';
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=8&dedupe=1&addressdetails=1&accept-language=th`;
  fetch(url, { headers: { 'User-Agent': 'TravelBuddyApp/1.0' } })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(results => {
      const list = document.getElementById('destResults');
      if (results.length === 0) {
        list.style.display = 'none';
        status.innerHTML = '❌ ไม่พบ &nbsp; <a href="#" onclick="openGmaps();return false;" style="color:var(--text);">เปิด Google Maps</a> เพื่อค้นหา';
        return;
      }
      list.innerHTML = results.map(r => {
        const name = r.address ? (r.address.tourism || r.address.attraction || r.address.hotel || r.address.restaurant || r.address.cafe || r.address.name || r.address.road || r.display_name.split(',')[0]) : r.display_name.split(',')[0];
        const street = r.address ? [r.address.road, r.address.suburb, r.address.city, r.address.state, r.address.country].filter(Boolean).join(', ') : r.display_name.split(',').slice(1,4).join(',').trim();
        const cat = r.type === 'hotel' ? '🏨' : r.type === 'restaurant' ? '🍽️' : r.type === 'cafe' ? '☕' : r.type === 'attraction' || r.type === 'tourism' ? '🎯' : r.type === 'museum' ? '🏛️' : r.type === 'park' ? '🌳' : r.type === 'beach' ? '🏖️' : '📍';
        const safe = name.trim().replace(/'/g, "\\'");
        return `<div class="sr-item" onclick="pickDestResult(${r.lat}, ${r.lon}, '${safe}')">
          <span>${cat}</span>
          <div><div class="sr-name">${escHtml(name.trim())}</div><div class="sr-addr">${escHtml(street)}</div></div>
        </div>`;
      }).join('');
      list.style.display = 'block';
      status.textContent = `พบ ${results.length} แห่ง`;
    })
    .catch(() => {
      document.getElementById('destResults').style.display = 'none';
      document.getElementById('destSearchStatus').innerHTML = '⚠️ ค้นหาผิดพลาด &nbsp; <a href="#" onclick="openGmaps();return false;" style="color:var(--text);">เปิด Google Maps</a>';
    });
}

function pickDestResult(lat, lng, name) {
  document.getElementById('destLat').value = lat;
  document.getElementById('destLng').value = lng;
  document.getElementById('destName').value = name;
  document.getElementById('destResults').style.display = 'none';
  document.getElementById('destSearchStatus').textContent = `✅ ${parseFloat(lat).toFixed(4)}, ${parseFloat(lng).toFixed(4)}`;
}
window.pickDestResult = pickDestResult;

function addDest() {
  const t = currentTrip(); if (!t) return;
  const name = document.getElementById('destName').value.trim();
  if (!name) { showToast('กรุณาใส่ชื่อสถานที่'); return; }
  const lat = parseFloat(document.getElementById('destLat').value) || null;
  const lng = parseFloat(document.getElementById('destLng').value) || null;
  const notes = document.getElementById('destNotes').value.trim();
  (t.destinations || (t.destinations = [])).push({
    id: genId(), name, lat, lng, notes, date: Date.now()
  });
  saveData(); closeModal(); renderTabContent(t);
}
window.addDest = addDest;

function deleteDest(idx) {
  if (!confirm('ลบสถานที่นี้?')) return;
  const t = currentTrip(); if (!t) return;
  (t.destinations || []).splice(idx, 1);
  saveData(); renderTabContent(t);
}
window.deleteDest = deleteDest;

// ═══════════════════════════════════════════════
//  PACKING
// ═══════════════════════════════════════════════
window._packFilter = null;

function renderPacking(t) {
  const members = t.members || [];
  if (members.length === 0) return '<div class="empty-state-text"><span class="icon">👥</span>เพิ่มสมาชิกก่อนแพ็คกระเป๋า</div>';
  if (!window._packFilter || !members.find(m => m.id === window._packFilter)) {
    window._packFilter = members[0].id;
  }
  const allItems = t.packingItems || [];
  const filtered = allItems.filter(i => i.memberId === window._packFilter);
  const total = filtered.length;
  const done = filtered.filter(i => i.checked).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;

  return `
    <div class="card">
      <div class="card-header">
        <h3>🎒 กระเป๋าเดินทาง</h3>
        <span class="badge">${done}/${total}</span>
      </div>
      ${total > 0 ? `
      <div style="height:6px;background:var(--line-light);border-radius:4px;margin-bottom:16px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:var(--mint);border-radius:4px;transition:width 0.3s;"></div>
      </div>` : ''}
      <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;">
        ${members.map(m => `
          <button class="btn btn-sm ${window._packFilter === m.id ? 'btn-primary' : 'btn-ghost'}" onclick="setPackFilter('${m.id}')" style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
            ${memberAvatar(m)} ${escHtml(m.name)}
          </button>
        `).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input id="packInput" placeholder="เพิ่มของที่จะเอาไป..." style="flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:0.85rem;" onkeydown="if(event.key==='Enter'){event.preventDefault();addPackItem()}">
        <button class="btn btn-primary" onclick="addPackItem()">เพิ่ม</button>
      </div>
      ${filtered.length === 0 ? '<div class="empty-state-text"><span class="icon">🎒</span>ยังไม่มีรายการของ ' + escHtml(members.find(m => m.id === window._packFilter)?.name || '') + '</div>' :
        filtered.map(item => `
          <div class="pack-item ${item.checked ? 'checked' : ''}">
            <label>
              <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="togglePackById('${item.id}')">
              ${escHtml(item.text)}
            </label>
            <div style="display:flex;gap:2px;">
              <button class="pack-del material-icons-outlined" onclick="showEditPackModal('${item.id}')" title="แก้ไข" style="font-size:16px;">edit</button>
              <button class="pack-del material-icons-outlined" onclick="deletePackById('${item.id}')" title="ลบ">close</button>
            </div>
          </div>
        `).join('')}
    </div>
  `;
}

function setPackFilter(id) {
  window._packFilter = id;
  renderTabContent(currentTrip());
}
window.setPackFilter = setPackFilter;

function addPackItem() {
  const t = currentTrip(); if (!t) return;
  const input = document.getElementById('packInput');
  const text = input.value.trim();
  if (!text) return;
  const memberId = window._packFilter;
  (t.packingItems || (t.packingItems = [])).push({ id: genId(), text, checked: false, memberId });
  input.value = '';
  saveData(); renderTabContent(t);
}
window.addPackItem = addPackItem;

function showEditPackModal(id) {
  const t = currentTrip(); if (!t) return;
  const item = (t.packingItems || []).find(i => i.id === id);
  if (!item) return;
  const members = t.members || [];
  showModal(`
    <h3>✏️ แก้ไขรายการ</h3>
    <div class="form-group">
      <label>รายการ</label>
      <input id="editPackText" value="${escHtml(item.text)}" autofocus>
    </div>
    <div class="form-group">
      <label>เจ้าของ</label>
      <select id="editPackOwner">
        ${members.map(m => `<option value="${m.id}" ${m.id === item.memberId ? 'selected' : ''}>${memberAvatar(m)} ${escHtml(m.name)}</option>`).join('')}
      </select>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveEditPack('${id}')">บันทึก</button>
    </div>
  `);
}
window.showEditPackModal = showEditPackModal;

function saveEditPack(id) {
  const t = currentTrip(); if (!t) return;
  const item = (t.packingItems || []).find(i => i.id === id);
  if (!item) return;
  const text = document.getElementById('editPackText').value.trim();
  if (!text) { showToast('กรุณาใส่ข้อความ'); return; }
  item.text = text;
  item.memberId = document.getElementById('editPackOwner').value;
  saveData(); closeModal(); renderTabContent(t);
}
window.saveEditPack = saveEditPack;

function togglePackById(id) {
  const t = currentTrip(); if (!t) return;
  const item = (t.packingItems || []).find(i => i.id === id);
  if (item) { item.checked = !item.checked; saveData(); renderTabContent(t); }
}
window.togglePackById = togglePackById;

function deletePackById(id) {
  if (!confirm('ลบรายการนี้?')) return;
  const t = currentTrip(); if (!t) return;
  const idx = (t.packingItems || []).findIndex(i => i.id === id);
  if (idx !== -1) { t.packingItems.splice(idx, 1); saveData(); renderTabContent(t); }
}
window.deletePackById = deletePackById;

// ═══════════════════════════════════════════════
//  ITINERARY
// ═══════════════════════════════════════════════
function fmtDate(d) {
  if (!d) return '';
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const p = d.split('-');
  const dt = new Date(+p[0], +p[1]-1, +p[2]);
  return `${days[dt.getDay()]} ${+p[2]} ${months[+p[1]-1]} ${+p[0]}`;
}

function renderItinerary(t) {
  const items = t.itinerary || [];
  const dates = [...new Set(items.map(i => i.date || ''))].filter(Boolean).sort();
  const oldDays = [...new Set(items.filter(i => !i.date).map(i => i.day))].sort((a,b) => a-b);
  return `
    <div class="card">
      <div class="card-header">
        <h3>📅 กำหนดการ</h3>
        <button class="btn btn-primary btn-sm" onclick="showAddItinModal()">+ เพิ่มกิจกรรม</button>
      </div>
      ${items.length === 0 ? '<div class="empty-state-text"><span class="icon">📅</span>ยังไม่มีกำหนดการ<br>วางแผนกิจกรรมกันเลย!</div>' : `
        ${dates.map(date => `
          <div class="itin-day">
            <h4><span class="material-icons-outlined" style="font-size:16px;">calendar_today</span> ${fmtDate(date)}</h4>
            ${items.filter(i => i.date === date).sort((a,b) => (a.time||'').localeCompare(b.time||'')).map(item => {
              const realIdx = items.indexOf(item);
              return `
                <div class="itin-item">
                  <div class="itin-time">${item.time ? escHtml(item.time) : ''}</div>
                  <div class="itin-info">
                    <div class="itin-activity">${escHtml(item.activity)}</div>
                    ${item.location ? `<div class="itin-loc">📍 ${escHtml(item.location)}</div>` : ''}
                    ${item.notes ? `<div style="font-size:0.75rem;color:var(--text-light);">${escHtml(item.notes)}</div>` : ''}
                  </div>
                  <button class="itin-del material-icons-outlined" onclick="deleteItin(${realIdx})">close</button>
                </div>
              `;
            }).join('')}
          </div>
        `).join('')}
        ${oldDays.map(day => `
          <div class="itin-day">
            <h4><span class="material-icons-outlined" style="font-size:16px;">calendar_today</span> วันที่ ${day}</h4>
            ${items.filter(i => !i.date && i.day === day).sort((a,b) => (a.time||'').localeCompare(b.time||'')).map(item => {
              const realIdx = items.indexOf(item);
              return `
                <div class="itin-item">
                  <div class="itin-time">${item.time ? escHtml(item.time) : ''}</div>
                  <div class="itin-info">
                    <div class="itin-activity">${escHtml(item.activity)}</div>
                    ${item.location ? `<div class="itin-loc">📍 ${escHtml(item.location)}</div>` : ''}
                    ${item.notes ? `<div style="font-size:0.75rem;color:var(--text-light);">${escHtml(item.notes)}</div>` : ''}
                  </div>
                  <button class="itin-del material-icons-outlined" onclick="deleteItin(${realIdx})">close</button>
                </div>
              `;
            }).join('')}
          </div>
        `).join('')}
      `}
    </div>
  `;
}

function showAddItinModal() {
  const t = currentTrip();
  const dests = t ? (t.destinations || []) : [];
  const today = new Date().toISOString().slice(0,10);
  showModal(`
    <h3>📅 เพิ่มกิจกรรม</h3>
    <div class="form-row">
      <div class="form-group">
        <label>วันที่</label>
        <input id="itinDate" type="date" value="${today}">
      </div>
      <div class="form-group">
        <label>เวลา</label>
        <input id="itinTime" type="time" value="09:00">
      </div>
    </div>
    <div class="form-group">
      <label>กิจกรรม</label>
      <input id="itinActivity" placeholder="เช่น รับประทานอาหารเช้า" autofocus>
    </div>
    <div class="form-group">
      <label>สถานที่</label>
      <input id="itinLocation" placeholder="พิมพ์หรือเลือกจากรายการ..." list="destList">
      <datalist id="destList">
        ${dests.map(d => `<option value="${escHtml(d.name)}">📍 ${escHtml(d.name)}</option>`).join('')}
      </datalist>
      ${dests.length > 0 ? `<div style="font-size:0.75rem;color:var(--text-light);margin-top:4px;">📍 สถานที่ในทริป: ${dests.map(d => escHtml(d.name)).join(', ')}</div>` : ''}
    </div>
    <div class="form-group">
      <label>โน้ต (ไม่บังคับ)</label>
      <input id="itinNotes" placeholder="">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addItin()">เพิ่ม</button>
    </div>
  `);
}
window.showAddItinModal = showAddItinModal;

function addItin() {
  const t = currentTrip(); if (!t) return;
  const date = document.getElementById('itinDate').value;
  const time = document.getElementById('itinTime').value;
  const activity = document.getElementById('itinActivity').value.trim();
  if (!activity) { showToast('กรุณาใส่กิจกรรม'); return; }
  const location = document.getElementById('itinLocation').value.trim();
  const notes = document.getElementById('itinNotes').value.trim();
  (t.itinerary || (t.itinerary = [])).push({ id: genId(), date, time, activity, location, notes });
  saveData(); closeModal(); renderTabContent(t);
}
window.addItin = addItin;

function deleteItin(idx) {
  if (!confirm('ลบกิจกรรมนี้?')) return;
  const t = currentTrip(); if (!t) return;
  (t.itinerary || []).splice(idx, 1);
  saveData(); renderTabContent(t);
}
window.deleteItin = deleteItin;

// ═══════════════════════════════════════════════
//  NOTES
// ═══════════════════════════════════════════════
function renderNotes(t) {
  const notes = Array.isArray(t.notes) ? t.notes : (t.notes ? [{ id: 'old', text: t.notes, createdAt: t.createdAt || Date.now() }] : []);
  const sorted = [...notes].sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  return `
    <div class="card">
      <div class="card-header">
        <h3>📝 โน้ตทริป</h3>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <textarea id="noteInput" placeholder="เขียนอะไรสักหน่อย..." style="flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:0.85rem;resize:vertical;min-height:60px;font-family:var(--font);"></textarea>
        <button class="btn btn-primary" onclick="addNote()" style="align-self:flex-end;">📌 ปักโน้ต</button>
      </div>
      ${sorted.length === 0 ? '<div class="empty-state-text"><span class="icon">📝</span>ยังไม่มีโน้ต<br>เริ่มเขียนกันเลย!</div>' :
        sorted.map(n => {
          const d = n.createdAt ? new Date(n.createdAt) : null;
          const dateStr = d ? `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}` : '';
          return `
            <div class="note-card">
              <button class="note-del material-icons-outlined" onclick="deleteNote('${n.id}')">close</button>
              <div class="note-text">${escHtml(n.text)}</div>
              <div class="note-meta">
                <span class="material-icons-outlined" style="font-size:14px;">schedule</span>
                ${dateStr}
              </div>
            </div>
          `;
        }).join('')}
    </div>
  `;
}

function addNote() {
  const t = currentTrip(); if (!t) return;
  const text = document.getElementById('noteInput').value.trim();
  if (!text) { showToast('พิมพ์ข้อความก่อน'); return; }
  const notes = Array.isArray(t.notes) ? t.notes : [];
  notes.push({ id: genId(), text, createdAt: Date.now() });
  t.notes = notes;
  saveData(); renderTabContent(t);
}
window.addNote = addNote;

function deleteNote(id) {
  if (!confirm('ลบโน้ตนี้?')) return;
  const t = currentTrip(); if (!t) return;
  const notes = Array.isArray(t.notes) ? t.notes : [];
  t.notes = notes.filter(n => n.id !== id);
  saveData(); renderTabContent(t);
}
window.deleteNote = deleteNote;

// ═══════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
window.showModal = showModal;

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
window.closeModal = closeModal;
document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === this) closeModal();
};


// Install PWA prompt
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
});

function installApp() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  _installPrompt.userChoice.then(() => { _installPrompt = null; });
}
window.installApp = installApp;

(async function init() {
  try {
    await waitSupabase();
    await loadData();
    const saved = getSavedProfile();
    if (saved) {
      _currentProfile = saved;
      updateUserBadge();
      filterMyTrips();
    } else {
      data.trips = [];
      showAuth();
    }
    renderSidebar();
    renderTrip();
  } catch (e) {
    document.body.innerHTML = `<div style="padding:40px;font-family:sans-serif;"><h2>เกิดข้อผิดพลาด</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;margin-top:12px;overflow:auto;">${escHtml(e.stack || e.message || e)}</pre></div>`;
  }
})();

// Register Service Worker (skip on file://)
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// Re-init map on tab switch
const origRenderTab = renderTabContent;
renderTabContent = function(t) {
  origRenderTab(t);
  if (currentTab === 'destinations' && t) {
    setTimeout(() => initMap(t), 100);
  }
};
</script>
